<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NanoGS</title>
  <link rel="stylesheet" href="./styles.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
    }
  }
  </script>

  <script type="module" src="./app.js"></script>
</head>
<body>
  <div id="app">
    <div id="layer-right" class="layer"></div>
    <div id="layer-left" class="layer"></div>
    <div id="interaction-layer"></div>

    <div id="topbar">
      <div id="brand">
        <div id="brand-title">NanoGS</div>
        <div id="brand-subtitle">Browser demo for Gaussian Splat simplification</div>
      </div>

      <div id="controls">
        <label class="file-btn">
          Load original
          <input id="input-original" class="hidden-input" type="file" accept=".ply" />
        </label>

        <div class="control-group control-group-wide">
          <label for="ratio">ratio</label>
          <input id="ratio" type="range" min="0.02" max="0.95" step="0.01" value="0.10" />
          <input id="ratio-number" type="number" min="0.02" max="0.95" step="0.01" value="0.10" />
        </div>

        <div class="control-group">
          <label for="k">k</label>
          <input id="k" type="number" min="2" max="64" step="1" value="12" />
        </div>

        <div class="control-group">
          <label for="opacity-threshold">opacity</label>
          <input id="opacity-threshold" type="number" min="0" max="1" step="0.01" value="0.10" />
        </div>

        <div class="control-group">
          <label for="lam-geo">geo</label>
          <input id="lam-geo" type="number" min="0" max="10" step="0.1" value="1.0" />
        </div>

        <div class="control-group">
          <label for="lam-sh">sh</label>
          <input id="lam-sh" type="number" min="0" max="10" step="0.1" value="1.0" />
        </div>

        <button id="btn-simplify" class="btn btn-primary" type="button">Simplify</button>
        <button id="btn-download" class="btn" type="button" disabled>Download simplified</button>
      </div>
    </div>

    <aside id="progress-panel">
      <div class="panel-card">
        <div class="panel-header">
          <div>
            <div class="panel-title">Progress track</div>
            <div class="panel-subtitle">Click a stage to preview it on the right</div>
          </div>
          <div id="progress-percent" class="badge">0%</div>
        </div>

        <div id="progress-bar" title="Drag to preview progress stages">
            <div id="progress-bar-fill"></div>
            <div id="progress-bar-handle"></div>
        </div>

        <div id="stats-grid">
          <div class="stat">
            <div class="stat-label">Original</div>
            <div id="stat-original" class="stat-value">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Target</div>
            <div id="stat-target" class="stat-value">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Current</div>
            <div id="stat-current" class="stat-value">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Shown</div>
            <div id="stat-shown" class="stat-value">-</div>
          </div>
        </div>

        <div id="track-list"></div>
      </div>
    </aside>

    <div id="ui">
      <div id="label-left" class="label">Original: example.ply</div>
      <div id="label-right" class="label">NanoGS: example_0.1.ply</div>
      <div id="divider"></div>
      <div id="handle"></div>
    </div>
  </div>
</body>
</html>
