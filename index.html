<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NanoGS</title>
  <link rel="stylesheet" href="./styles.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
    }
  }
  </script>

  <script type="module" src="./app.js"></script>
</head>
<body>
  <div id="app">
    <div id="viewer">
      <div id="layer-right" class="layer"></div>
      <div id="layer-left" class="layer"></div>
      <div id="interaction-layer"></div>

      <div id="ui">
        <div id="label-left" class="label">Original: …</div>
        <div id="label-right" class="label">NanoGS: …</div>
        <div id="divider"></div>
        <div id="handle"></div>
      </div>
    </div>

    <aside id="progress-panel">
      <div class="panel-card">
        <div id="topbar">
          <div id="brand">
            <div id="brand-title">NanoGS</div>
            <div id="brand-subtitle">Training-Free Gaussian Splat Simplification</div>
          </div>

          <div id="controls">
            <div class="controls-row">
              <label class="file-btn">
                Load
                <input id="input-original" class="hidden-input" type="file" accept=".ply" />
              </label>

              <button id="btn-simplify" class="btn btn-primary" type="button">Simplify</button>
            </div>

            <div class="hyper-params">
              <div class="control-group control-group-wide">
                <div class="control-group-header">
                  <label for="ratio">Ratio</label>
                </div>
                <div class="ratio-input-row">
                  <input id="ratio" type="range" min="0.01" max="0.99" step="0.01" value="0.10" />
                  <input id="ratio-number" type="number" min="0.01" max="0.99" step="0.01" value="0.10" />
                </div>
              </div>
            </div>

            <div id="stats-grid">
              <div class="stat">
                <div class="stat-label">Original</div>
                <div id="stat-original" class="stat-value">-</div>
              </div>
              <div class="stat">
                <div class="stat-label">Target</div>
                <div id="stat-target" class="stat-value">-</div>
              </div>
            </div>
          </div>
        </div>

        <div class="sidepanel-divider" role="presentation"></div>

        <div class="panel-header">
          <div>
            <div class="panel-title">Progress track</div>
          </div>
          <div id="progress-percent" class="badge">0%</div>
        </div>

        <div id="progress-bar" title="Drag to preview progress stages">
          <div id="progress-bar-fill"></div>
          <div id="progress-bar-handle"></div>
        </div>

        <div id="track-list"></div>
      </div>
    </aside>
  </div>
</body>
</html>
