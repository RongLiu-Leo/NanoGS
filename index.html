<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NanoGS</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
    }

    .layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .layer canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #layer-right {
      z-index: 10;
    }

    #layer-left {
      z-index: 20;
      clip-path: inset(0 50% 0 0);
      -webkit-clip-path: inset(0 50% 0 0);
    }

    /* Full-screen interaction layer for Spark/OrbitControls */
    #interaction-layer {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: auto;
      background: transparent;
    }

    /* UI overlay only intercepts handle dragging */
    #ui {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }

    .label {
      position: absolute;
      top: 12px;
      padding: 6px 10px;
      background: rgba(0,0,0,0.40);
      color: white;
      border-radius: 8px;
      font-size: 14px;
      pointer-events: none;
      user-select: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
    }

    #label-left { left: 12px; }
    #label-right { right: 12px; }

    /* Glass vertical divider bar */
    #divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 4px;
      transform: translateX(-2px);
      pointer-events: none;
      border-left: 1px solid rgba(255,255,255,0.30);
      border-right: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06) inset,
        0 0 16px rgba(0,0,0,0.18);
    }

    /* Drag handle */
    #handle {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 10px;
      transform: translateX(-5px);
      cursor: ew-resize;
      pointer-events: auto;
      touch-action: none;
      background: transparent;
    }

    #handle::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 56px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.40);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08) inset,
        0 6px 12px rgba(0,0,0,0.25);
    }

    /* Small grip lines */
    #handle::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 20px;
      transform: translate(-50%, -50%);
      border-radius: 3px;
      background:
        linear-gradient(
          to right,
          rgba(255,255,255,0.75) 0px,
          rgba(255,255,255,0.75) 1px,
          transparent 1px,
          transparent 2px,
          rgba(255,255,255,0.75) 2px,
          rgba(255,255,255,0.75) 3px,
          transparent 3px,
          transparent 4px,
          rgba(255,255,255,0.75) 4px,
          rgba(255,255,255,0.75) 5px,
          transparent 5px
        );
      opacity: 0.8;
      pointer-events: none;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
    }
  }
  </script>
</head>
<body>
#TODO: add title and authors
  <div id="app">
    
    <div id="layer-right" class="layer"></div>
    <div id="layer-left" class="layer"></div>

    <div id="interaction-layer"></div>

    <div id="ui">
      <div id="label-left" class="label">Original: example.ply</div>
      <div id="label-right" class="label">NanoGS: example_0.1.ply</div>
      <div id="divider"></div>
      <div id="handle"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { SplatMesh } from "@sparkjsdev/spark";

    const app = document.getElementById("app");
    const layerLeft = document.getElementById("layer-left");
    const layerRight = document.getElementById("layer-right");
    const interactionLayer = document.getElementById("interaction-layer");
    const divider = document.getElementById("divider");
    const handle = document.getElementById("handle");

    const rendererLeft = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    const rendererRight = new THREE.WebGLRenderer({ antialias: true, alpha: false });

    rendererLeft.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    rendererRight.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    rendererLeft.setClearColor(0x111111, 1);
    rendererRight.setClearColor(0x111111, 1);

    layerLeft.appendChild(rendererLeft.domElement);
    layerRight.appendChild(rendererRight.domElement);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 3);

    // Attach controls to the full-screen interaction layer
    const controls = new OrbitControls(camera, interactionLayer);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const sceneLeft = new THREE.Scene();
    const sceneRight = new THREE.Scene();

    const original = new SplatMesh({ url: "./example.ply" });
    const compressed = new SplatMesh({ url: "./example_0.1.ply" });

    original.position.set(0, 0, 0);
    compressed.position.set(0, 0, 0);

    sceneLeft.add(original);
    sceneRight.add(compressed);

    let split = 0.5;

    function setSplit(t) {
      split = Math.max(0, Math.min(1, t));
      const pct = split * 100;

      divider.style.left = `${pct}%`;
      handle.style.left = `${pct}%`;

      const rightInset = 100 - pct;
      const clip = `inset(0 ${rightInset}% 0 0)`;
      layerLeft.style.clipPath = clip;
      layerLeft.style.webkitClipPath = clip;
    }

    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      rendererLeft.setSize(w, h, false);
      rendererRight.setSize(w, h, false);

      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    function clientXToSplit(clientX) {
      const rect = app.getBoundingClientRect();
      return (clientX - rect.left) / rect.width;
    }

    let dragging = false;

    handle.addEventListener("pointerdown", (e) => {
      dragging = true;
      handle.setPointerCapture(e.pointerId);
      controls.enabled = false;
      setSplit(clientXToSplit(e.clientX));
      e.preventDefault();
      e.stopPropagation();
    });

    handle.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      setSplit(clientXToSplit(e.clientX));
      e.preventDefault();
      e.stopPropagation();
    });

    function stopDrag(e) {
      if (!dragging) return;
      dragging = false;
      controls.enabled = true;
      try {
        handle.releasePointerCapture(e.pointerId);
      } catch (_) {}
      e.preventDefault();
      e.stopPropagation();
    }

    handle.addEventListener("pointerup", stopDrag);
    handle.addEventListener("pointercancel", stopDrag);

    window.addEventListener("resize", resize);

    function animate() {
      controls.update();
      rendererRight.render(sceneRight, camera);
      rendererLeft.render(sceneLeft, camera);
      requestAnimationFrame(animate);
    }

    resize();
    setSplit(0.5);
    animate();
  </script>
</body>
</html>
